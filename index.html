<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الارشيف الالكتروني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'haj-dark': '#0b3d24',
                        'haj-primary': '#115e3b',
                        'haj-secondary': '#1b8053',
                        'haj-light': '#e8f5e9',
                        'haj-gold': '#d4af37'
                    },
                    fontFamily: {
                        'arabic': ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0fdf4;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23115e3b" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
        }
        .white-logo {
            filter: brightness(0) invert(1);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(11, 61, 36, 0.1);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #115e3b;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Tab Styles */
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-active {
            background-color: #115e3b;
            color: white;
            border-color: #115e3b;
        }
        .tab-inactive {
            background-color: transparent;
            color: #115e3b;
            border-color: #115e3b;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-gray-800">

    <!-- Header -->
<header class="bg-haj-dark text-white py-3 md:py-4 shadow-lg border-b-4 border-haj-gold">
    <div class="container mx-auto px-2 md:px-4 flex justify-between items-center gap-2 md:gap-4">
        
        <img src="https://image2url.com/r2/default/images/1773558610625-b250b6cd-d224-421f-b749-0894a9cf0602.png" 
             alt="Euroconsult Logo" 
             class="h-8 sm:h-10 md:h-16 w-auto object-contain shrink-0 white-logo">
        
        <div class="text-center flex-1 px-1">
            <h1 class="text-xs sm:text-sm md:text-xl font-bold leading-tight">الارشيف الالكتروني</h1>
            <p class="text-[10px] sm:text-xs md:text-sm text-haj-gold font-medium mt-1">في المشاعر المقدسة</p>
        </div>
        
        <img src="https://haj.gov.sa/_next/image?url=https%3A%2F%2Fhaj.gov.sa%2Fs-core%2F-%2Fmedia%2FProject%2FHAJJ%2FHajj-Logos%2FFooter-Logo.svg%3Fiar%3D0%26hash%3DB264A0694E67A2E26811BCC3C7B24DD5&w=1920&q=75" 
             alt="Hajj Ministry Logo" 
             class="h-8 sm:h-10 md:h-16 w-auto object-contain shrink-0 white-logo">
             
    </div>
</header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-1 flex justify-center items-start">
        <div class="glass-panel w-full max-w-2xl rounded-2xl p-6 md:p-8">
            
            <!-- Tabs / Switcher -->
            <div class="flex justify-center space-x-reverse space-x-2 mb-8 bg-gray-100 p-1 rounded-xl">
                <button type="button" onclick="switchTab('housing')" id="tab-housing" class="tab-btn tab-active w-1/2 py-3 rounded-lg font-bold text-sm md:text-base border-2">
                    <i class="fas fa-campground ml-2"></i> إسكان الحجاج
                </button>
                <button type="button" onclick="switchTab('projects')" id="tab-projects" class="tab-btn tab-inactive w-1/2 py-3 rounded-lg font-bold text-sm md:text-base border-2">
                    <i class="fas fa-hard-hat ml-2"></i> المشاريع التطويرية
                </button>
            </div>

            <form id="uploadForm" class="space-y-5">
                
                <!-- Surveyor Name (Shared) -->
                <div>
                    <label class="block text-sm font-bold text-haj-dark mb-1">اسم الراصد *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-user-tie"></i></span>
                        <select id="surveyorName" required class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all appearance-none bg-white">
                            <option value="" disabled selected>اختر اسم الراصد...</option>
                            <option value="م مصطفى محمد حافظ">م مصطفى محمد حافظ</option>
                            <option value="م عبدالعزيز خالد الصحفي">م عبدالعزيز خالد الصحفي</option>
                            <option value="م احمد محمد الحرازي">م احمد محمد الحرازي</option>
                            <option value="م عبدالعزيز سليم القرشي">م عبدالعزيز سليم القرشي</option>
                            <option value="م انس عبدالعزيز المجنوني">م انس عبدالعزيز المجنوني</option>
                            <option value="م عمار علي زبرماوي">م عمار علي زبرماوي</option>
                            <option value="م احمد طلال الهلالي">م احمد طلال الهلالي</option>
                            <option value="م اشرف ابراهيم عوض">م اشرف ابراهيم عوض</option>
                            <option value="م اسلام محمد قنديل">م اسلام محمد قنديل</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down text-sm"></i>
                        </div>
                    </div>
                </div>

                <!-- ================== HOUSING FIELDS ================== -->
                <div id="housingFields" class="space-y-5 block">
                    <!-- Holy Site -->
                    <div>
                        <label class="block text-sm font-bold text-haj-dark mb-1">المشعر *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-map-marker-alt"></i></span>
                            <select id="holySite" required class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all appearance-none bg-white">
                                <option value="" disabled selected>اختر المشعر...</option>
                                <option value="منى">مشعر منى</option>
                                <option value="عرفات">مشعر عرفات</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-gray-500">
                                <i class="fas fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <!-- Zone Number -->
                        <div>
                            <label class="block text-sm font-bold text-haj-dark mb-1">رقم الزون *</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-layer-group"></i></span>
                                <input type="number" id="zoneNumber" required placeholder="مثال: 1" 
                                    class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all">
                            </div>
                        </div>

                        <!-- Shakhis / Camp ID -->
                        <div>
                            <label class="block text-sm font-bold text-haj-dark mb-1">رقم الشاخص للمخيم *</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-hashtag"></i></span>
                                <input type="text" id="campId" required placeholder="رقم الشاخص" 
                                    class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ================== PROJECTS FIELDS ================== -->
                <div id="projectsFields" class="space-y-5 hidden">
                    <!-- Project Name -->
                    <div>
                        <label class="block text-sm font-bold text-haj-dark mb-1">المشروع التطويري *</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-project-diagram"></i></span>
                            <select id="projectName" class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all appearance-none bg-white">
                                <option value="" disabled selected>اختر المشروع...</option>
                                <option value="السلالم الكهربائية - منى">السلالم الكهربائية - منى</option>
                                <option value="توسعة مستشفى الرابطة - منى">توسعة مستشفى الرابطة - منى</option>
                                <option value="ترميم دورات المياه القائمة - عرفات">ترميم دورات المياه القائمة - عرفات</option>
                                <option value="إحلال وتجديد دورات المياه - منى">إحلال وتجديد دورات المياه - منى</option>
                                <option value="تركيب دورات المياه سابقة التجهيز - عرفات">تركيب دورات المياه سابقة التجهيز - عرفات</option>
                                <option value="تركيب دورات المياه سابقة التجهيز - مزدلفة">تركيب دورات المياه سابقة التجهيز - مزدلفة</option>
                                <option value="إنشاء استراحة - مزدلفة">إنشاء استراحة - مزدلفة</option>
                                <option value="تخفيف أثر الإجهاد الحراري بجبل الرحمة - عرفات">تخفيف أثر الإجهاد الحراري بجبل الرحمة - عرفات</option>
                                <option value="إحلال اللوحات الكهربائية - عرفات">إحلال اللوحات الكهربائية - عرفات</option>
                                <option value="إحلال اللوحات الكهربائية - منى">إحلال اللوحات الكهربائية - منى</option>
                                <option value="التشجير - مزدلفة">التشجير - مزدلفة</option>
                                <option value="التشجير - منى">التشجير - منى</option>
                                <option value="تظليل مسارات المشاة - منى">تظليل مسارات المشاة - منى</option>
                                <option value="إعداد شبكات الحريق والترويد - منى">إعداد شبكات الحريق والترويد - منى</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center px-4 text-gray-500">
                                <i class="fas fa-chevron-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Date (Shared) -->
                <div>
                    <label class="block text-sm font-bold text-haj-dark mb-1">تاريخ الرصد *</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400"><i class="fas fa-calendar-alt"></i></span>
                        <input type="date" id="surveyDate" required 
                            class="w-full pl-3 pr-10 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-haj-primary focus:border-haj-primary outline-none transition-all bg-white text-right">
                    </div>
                </div>

                <!-- Photos Upload (Shared) -->
                <div>
                    <label class="block text-sm font-bold text-haj-dark mb-1">الصور الملتقطة (اختر صور متعددة) *</label>
                    <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-xl hover:bg-haj-light transition-colors relative">
                        <div class="space-y-1 text-center">
                            <i class="fas fa-cloud-upload-alt text-4xl text-haj-secondary mb-3"></i>
                            <div class="flex text-sm text-gray-600 justify-center">
                                <label for="photos" class="relative cursor-pointer bg-white rounded-md font-medium text-haj-primary hover:text-haj-dark focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-haj-primary px-2">
                                    <span>اضغط لاختيار الصور من الموبايل</span>
                                    <input id="photos" name="photos" type="file" multiple accept="image/*" required class="sr-only">
                                </label>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">JPG, PNG مسموح بأي عدد من الصور</p>
                        </div>
                    </div>
                    <!-- Selected Files Preview -->
                    <div id="fileList" class="mt-3 text-sm text-gray-600 font-medium"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-xl shadow-sm text-lg font-bold text-white bg-haj-primary hover:bg-haj-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-haj-primary transition-all mt-6">
                    <i class="fas fa-paper-plane ml-2"></i> رفع البيانات والصور
                </button>

                <!-- Status Messages -->
                <div id="statusMessage" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-sm">
                </div>

            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-haj-dark text-white py-6 border-t border-green-800">
        <div class="container mx-auto px-4 text-center">
            <p class="text-xs md:text-sm leading-relaxed text-gray-300">
                جميع الحقوق محفوظة لفريق الدعم الفني للأرشفة الإلكترونية المحلية ودعم اتخاذ القرار<br>
                <span class="text-haj-gold font-bold">شركة يوروكونسلت مشروع وزارة الحج والعمرة © 2026</span>
            </p>
        </div>
    </footer>

    <script>
        // State Management
        let currentFormType = 'housing';

        // Set today's date as default
        document.getElementById('surveyDate').valueAsDate = new Date();

        // Switch Tabs Function
        function switchTab(type) {
            currentFormType = type;
            const tabHousing = document.getElementById('tab-housing');
            const tabProjects = document.getElementById('tab-projects');
            const housingFields = document.getElementById('housingFields');
            const projectsFields = document.getElementById('projectsFields');

            const housingInputs = [document.getElementById('holySite'), document.getElementById('zoneNumber'), document.getElementById('campId')];
            const projectInputs = [document.getElementById('projectName')];

            if (type === 'housing') {
                tabHousing.classList.replace('tab-inactive', 'tab-active');
                tabProjects.classList.replace('tab-active', 'tab-inactive');
                housingFields.classList.remove('hidden');
                projectsFields.classList.add('hidden');
                
                housingInputs.forEach(input => input.setAttribute('required', 'true'));
                projectInputs.forEach(input => input.removeAttribute('required'));
            } else {
                tabProjects.classList.replace('tab-inactive', 'tab-active');
                tabHousing.classList.replace('tab-active', 'tab-inactive');
                projectsFields.classList.remove('hidden');
                housingFields.classList.add('hidden');
                
                projectInputs.forEach(input => input.setAttribute('required', 'true'));
                housingInputs.forEach(input => input.removeAttribute('required'));
            }
        }

        const fileInput = document.getElementById('photos');
        const fileList = document.getElementById('fileList');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                fileList.innerHTML = `<span class="text-haj-secondary"><i class="fas fa-check-circle ml-1"></i> تم اختيار ${this.files.length} صورة/صور</span>`;
            } else {
                fileList.innerHTML = '';
            }
        });

        // ==========================================
        // رابط السكربت الخاص بك المحدّث
        // ==========================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbtZxdt_Ls_cX9-wY14uXPSt7mUjCeFJunxuVjkgcjhCWz--Av0hvJdXy_RRJMdQAenQ/exec'; 

        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        const readFileAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve({
                    name: file.name,
                    mimeType: file.type,
                    data: reader.result.split(',')[1]
                });
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<div class="loader ml-3"></div> جاري الرفع للدرايف... برجاء الانتظار`;
            submitBtn.classList.replace('bg-haj-primary', 'bg-gray-500');
            statusMessage.classList.add('hidden');

            try {
                const surveyorName = document.getElementById('surveyorName').value;
                const surveyDate = document.getElementById('surveyDate').value;
                const files = fileInput.files;

                const base64Files = [];
                for (let i = 0; i < files.length; i++) {
                    const base64 = await readFileAsBase64(files[i]);
                    base64Files.push(base64);
                }

                const payload = {
                    formType: currentFormType,
                    surveyorName,
                    surveyDate,
                    files: base64Files
                };

                if (currentFormType === 'housing') {
                    payload.holySite = document.getElementById('holySite').value;
                    payload.zoneNumber = document.getElementById('zoneNumber').value;
                    payload.campId = document.getElementById('campId').value;
                } else {
                    payload.projectName = document.getElementById('projectName').value;
                }

                // الاتصال المباشر بالسكربت 
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });
                
                const result = await response.json();
                
                if(result.status === 'success'){
                    showStatus('success', 'تم رفع البيانات والصور وإنشاء المجلدات بنجاح في الدرايف!');
                    form.reset();
                    document.getElementById('surveyDate').valueAsDate = new Date();
                    fileList.innerHTML = '';
                    switchTab(currentFormType); 
                } else {
                    throw new Error(result.message || 'حدث خطأ غير معروف في السيرفر');
                }

            } catch (error) {
                console.error("Error:", error);
                showStatus('error', 'حدث خطأ أثناء الرفع: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-paper-plane ml-2"></i> رفع البيانات والصور`;
                submitBtn.classList.replace('bg-gray-500', 'bg-haj-primary');
            }
        });

        function showStatus(type, message) {
            statusMessage.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            if(type === 'success') {
                statusMessage.classList.add('bg-green-100', 'text-green-800');
                statusMessage.innerHTML = `<i class="fas fa-check-circle ml-1"></i> ${message}`;
            } else {
                statusMessage.classList.add('bg-red-100', 'text-red-800');
                statusMessage.innerHTML = `<i class="fas fa-exclamation-triangle ml-1"></i> ${message}`;
            }
        }
    </script>
</body>
</html>
